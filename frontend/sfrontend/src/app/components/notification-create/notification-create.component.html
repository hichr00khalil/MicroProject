<div class="create-notification-container">
  <h2>Create New Notification</h2>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="success" class="success-message">
    {{ success }}
  </div>

  <form (ngSubmit)="createNotification()" #notificationForm="ngForm">
    <div class="form-group">
      <label for="email">Email *</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        [(ngModel)]="notification.email" 
        required
        placeholder="Enter recipient email"
        class="form-control"
      >
    </div>

    <div class="form-group">
      <label for="message">Message *</label>
      <textarea 
        id="message" 
        name="message" 
        [(ngModel)]="notification.message" 
        required
        placeholder="Enter notification message"
        class="form-control"
        rows="4"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input 
        type="date" 
        id="date" 
        name="date" 
        [ngModel]="notification.date | date:'yyyy-MM-dd'" 
        (ngModelChange)="notification.date = $event"
        class="form-control"
      >
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input 
          type="checkbox" 
          name="read" 
          [(ngModel)]="notification.read"
        >
        Mark as read
      </label>
    </div>

    <div class="form-actions">
      <button 
        type="submit" 
        class="btn btn-primary" 
        [disabled]="loading || !notificationForm.form.valid"
      >
        {{ loading ? 'Creating...' : 'Create Notification' }}
      </button>
      <a routerLink="/notifications" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
